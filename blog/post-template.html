<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="{{TITLE}} — Juraj Orwell">
    <meta property="og:description" content="{{EXCERPT}}">

</head>
<body>
    <header class="site-header">

            <a href="../index.html" class="logo">Juraj Orwell</a>
