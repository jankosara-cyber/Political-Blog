name: YouTube Monitor

on:
  schedule:
    # Runs at 7:00 AM and 7:00 PM UTC every day
    - cron: '0 7 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    # Allows you to run this manually from GitHub's Actions tab anytime

jobs:
  check-for-new-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Check YouTube channels for new videos
        run: python scripts/check_youtube.py

      - name: Commit and push if new videos found
        run: |
          git config --global user.name "YouTube Monitor Bot"
          git config --global user.email "bot@jurajorwell.com"
          git add video-queue.json
          if git diff --staged --quiet; then
            echo "No new videos found. Nothing to commit."
          else
            git commit -m "🎬 New videos added to queue [$(date '+%Y-%m-%d %H:%M')]"
            git push
            echo "New videos committed to queue!"
          fi
