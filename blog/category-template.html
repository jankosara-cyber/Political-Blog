<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Články v kategórii {{CATEGORY_LABEL}} — Juraj Orwell">
    <meta property="og:title" content="{{CATEGORY_LABEL}} — Juraj Orwell">
    <meta property="og:type" content="website">
    <title>{{CATEGORY_LABEL}} — Juraj Orwell</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="../index.html" class="logo">Juraj Orwell</a>
            <nav>
                <a href="../index.html">Domov</a>
                <a href="../o-nas.html">O nás</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="category-header">
            <a href="../index.html" class="back-link">&larr; Všetky kategórie</a>
            <div class="category-label-wrap">
                <span class="category-pill">{{CATEGORY_SLUG}}</span>
            </div>
            <h1>{{CATEGORY_LABEL}}</h1>
            <p class="category-count">{{POST_COUNT}} článkov v tejto kategórii</p>
        </div>

        <section class="posts" id="posts">
            {{POSTS_HTML}}
        </section>

        <div class="load-more" id="load-more" style="display: none;">
            <button onclick="loadMore()">Načítať ďalšie články</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Juraj Orwell. Všetky práva vyhradené.</p>
        </div>
    </footer>
</body>
</html>
